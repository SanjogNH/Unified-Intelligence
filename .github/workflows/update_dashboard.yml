name: Update Dashboard Data

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data output

      - name: Download Google Sheet
        run: |
          curl -L "${{ secrets.SHEET_URL }}" -o data/dashboard.xlsx
          echo "Sheet downloaded: $(du -sh data/dashboard.xlsx | cut -f1)"

      - name: Run process.py
        run: |
          python process.py data/dashboard.xlsx output/index.json

      - name: Commit output files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/index.json output/skus.json output/city.json
          git diff --staged --quiet || git commit -m "chore: update dashboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
